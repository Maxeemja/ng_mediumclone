<mc-loading *ngIf="popularTagsStore.isLoading()"></mc-loading>
<mc-error-message
  *ngIf="popularTagsStore.error() as errorMessage"
  [message]="errorMessage"
></mc-error-message>

<div class="sidebar" *ngIf="popularTagsStore.data()?.tags as tags">
  <p>Popular tags</p>
  <div class="tag-list">
    <a
      *ngFor="let tag of tags"
      [routerLink]="['/tags', tag]"
      class="tag-default tag-pill"
    >
      {{ tag }}
    </a>
  </div>
</div>
