<nav class="navbar navbar-light">
  <div class="container">
    <a class="navbar-brand" routerLink="/"> medium</a>
    <ul class="nav navbar-nav pull-xs-right">
      <li class="nav-item">
        <a routerLink="/articles" class="nav-link">Home</a>
      </li>
      <ng-container *ngIf="authStore.currentUser() as currentUser">
        <li class="nav-item">
          <a routerLink="/articles/new" class="nav-link">
            <i class="ion-compose"></i>
            &nbsp; New Post
          </a>
        </li>
        <li class="nav-item">
          <a routerLink="/settings" class="nav-link">
            <i class="ion-gear-a"></i>
            &nbsp; Settings
          </a>
        </li>
        <li class="nav-item">
          <a [routerLink]="['/profiles', currentUser.username]" class="nav-link image">
            <img [src]="currentUser.image" alt="" style="width:25px" />
            &nbsp; {{ currentUser.username }}
          </a>
        </li>
      </ng-container>

      <ng-container *ngIf="authStore.currentUser() === null">
        <li class="nav-item">
          <a routerLink="/login" class="nav-link"> Sign In </a>
        </li>
        <li class="nav-item">
          <a routerLink="/register" class="nav-link"> Sign Up </a>
        </li>
      </ng-container>
    </ul>
  </div>
</nav>
